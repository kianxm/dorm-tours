  - generic [ref=e223]:
    - generic [ref=e224]:
      - img "Matterport" [ref=e225]
      - heading "Immersive scans, captured with Matterport technology." [level=2] [ref=e226]
      - paragraph [ref=e227]: Using LiDAR-equipped 3D cameras, every dorm has been mapped into an interactive walk-through. Future Broncos can explore the rooms, common areas, and the social feel of a hall before ever setting foot on campus.
      - list [ref=e228]:
        - listitem [ref=e229]:
          - generic [ref=e230]: "01"
          - generic [ref=e231]:
            - strong [ref=e232]: LiDAR-grade 3D capture
            - paragraph [ref=e233]: Every space scanned with sub-millimeter precision so you experience the room exactly as it is.
        - listitem [ref=e234]:
          - generic [ref=e235]: "02"
          - generic [ref=e236]:
            - strong [ref=e237]: Walk anywhere, look anywhere
            - paragraph [ref=e238]: Step through the entire dorm — the lounge, the bathroom, even the view from the window — at your own pace.
        - listitem [ref=e239]:
          - generic [ref=e240]: "03"
          - generic [ref=e241]:
            - strong [ref=e242]: Dollhouse & floorplan views
            - paragraph [ref=e243]: Toggle to a top-down floorplan or a doll-house cutaway to understand the layout instantly.
    - img "3D dollhouse view of a dorm scan" [ref=e246]
  - generic [ref=e248]:
    - generic [ref=e249]:
      - generic [ref=e250]: FAQ
      - heading "Everything you might be wondering." [level=2] [ref=e251]
      - paragraph [ref=e252]: Quick answers about how the tours work and what to expect.
    - list [ref=e253]:
      - listitem [ref=e254]:
        - button "What are virtual dorm tours?" [expanded] [ref=e255] [cursor=pointer]:
          - generic [ref=e256]: What are virtual dorm tours?
        - region [ref=e260]:
          - generic [ref=e261]: Virtual dorm tours let incoming students explore Santa Clara residence halls in 3D — captured with LiDAR-equipped cameras so the experience matches the real space. You get a feel for the layout and the social vibe of each hall before stepping on campus.
      - listitem [ref=e262]:
        - button "How do I view a dorm in 3D?" [ref=e263] [cursor=pointer]:
          - generic [ref=e264]: How do I view a dorm in 3D?
        - region:
          - generic: Tap any dorm card on the homepage. The 3D scan loads in your browser — click "Enter" and you can walk through the lobby, lounges, and rooms freely.
      - listitem [ref=e268]:
        - button "Which residence halls are available?" [ref=e269] [cursor=pointer]:
          - generic [ref=e270]: Which residence halls are available?
        - region:
          - generic: All on-campus first- and second-year halls plus University Villas and Nobili Hall for upperclassmen. Singles, doubles, mini-suites, and apartment-style options are all represented.
      - listitem [ref=e274]:
        - button "Will I see room dimensions and layouts?" [ref=e275] [cursor=pointer]:
          - generic [ref=e276]: Will I see room dimensions and layouts?
        - region:
          - generic: Yes. Each dorm page lists room dimensions, furniture sizes, and a floorplan image so you can plan exactly how your space will fit together.
      - listitem [ref=e280]:
        - button "Can I customize my virtual room?" [ref=e281] [cursor=pointer]:
          - generic [ref=e282]: Can I customize my virtual room?
        - region:
          - generic: Not yet. We're scoping a future update where students can place furniture and decor inside the scan to plan move-in day.
