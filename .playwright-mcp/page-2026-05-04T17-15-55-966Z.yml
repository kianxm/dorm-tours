      - heading "Built by SCU seniors, for the next generation of Broncos." [level=2] [ref=e195]
      - paragraph [ref=e196]: We're three senior computer engineering students at Santa Clara University. We built these immersive tours so incoming students can explore campus housing — and the community inside each hall — without ever needing to step on campus.
