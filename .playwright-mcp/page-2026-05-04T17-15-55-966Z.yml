  - generic [ref=e219]:
    - generic [ref=e220]:
      - img "Matterport" [ref=e221]
      - heading "Immersive scans, captured with Matterport technology." [level=2] [ref=e222]
      - paragraph [ref=e223]: Using LiDAR-equipped 3D cameras, every dorm has been mapped into an interactive walk-through. Future Broncos can explore the rooms, common areas, and the social feel of a hall before ever setting foot on campus.
      - list [ref=e224]:
        - listitem [ref=e225]:
          - generic [ref=e226]: "01"
          - generic [ref=e227]:
            - strong [ref=e228]: LiDAR-grade 3D capture
            - paragraph [ref=e229]: Every space scanned with sub-millimeter precision so you experience the room exactly as it is.
        - listitem [ref=e230]:
          - generic [ref=e231]: "02"
          - generic [ref=e232]:
            - strong [ref=e233]: Walk anywhere, look anywhere
            - paragraph [ref=e234]: Step through the entire dorm — the lounge, the bathroom, even the view from the window — at your own pace.
        - listitem [ref=e235]:
          - generic [ref=e236]: "03"
          - generic [ref=e237]:
            - strong [ref=e238]: Dollhouse & floorplan views
            - paragraph [ref=e239]: Toggle to a top-down floorplan or a doll-house cutaway to understand the layout instantly.
    - img "3D dollhouse view of a dorm scan" [ref=e242]
  - generic [ref=e244]:
    - generic [ref=e245]:
      - generic [ref=e246]: FAQ
      - heading "Everything you might be wondering." [level=2] [ref=e247]
      - paragraph [ref=e248]: Quick answers about how the tours work and what to expect.
    - list [ref=e249]:
      - listitem [ref=e250]:
        - button "What are virtual dorm tours?" [expanded] [ref=e251] [cursor=pointer]:
          - generic [ref=e252]: What are virtual dorm tours?
        - region [ref=e256]:
          - generic [ref=e257]: Virtual dorm tours let incoming students explore Santa Clara residence halls in 3D — captured with LiDAR-equipped cameras so the experience matches the real space. You get a feel for the layout and the social vibe of each hall before stepping on campus.
      - listitem [ref=e258]:
        - button "How do I view a dorm in 3D?" [ref=e259] [cursor=pointer]:
          - generic [ref=e260]: How do I view a dorm in 3D?
        - region:
          - generic: Tap any dorm card on the homepage. The 3D scan loads in your browser — click "Enter" and you can walk through the lobby, lounges, and rooms freely.
      - listitem [ref=e264]:
        - button "Which residence halls are available?" [ref=e265] [cursor=pointer]:
          - generic [ref=e266]: Which residence halls are available?
        - region:
          - generic: All on-campus first- and second-year halls plus University Villas and Nobili Hall for upperclassmen. Singles, doubles, mini-suites, and apartment-style options are all represented.
      - listitem [ref=e270]:
        - button "Will I see room dimensions and layouts?" [ref=e271] [cursor=pointer]:
          - generic [ref=e272]: Will I see room dimensions and layouts?
        - region:
          - generic: Yes. Each dorm page lists room dimensions, furniture sizes, and a floorplan image so you can plan exactly how your space will fit together.
      - listitem [ref=e276]:
        - button "Can I customize my virtual room?" [ref=e277] [cursor=pointer]:
          - generic [ref=e278]: Can I customize my virtual room?
        - region:
          - generic: Not yet. We're scoping a future update where students can place furniture and decor inside the scan to plan move-in day.
